<script>

<!------ Library ------>

function _live(root, selector, eventType, callback) {
  // normalize optional args
  if (callback === undefined) { callback = eventType; eventType = selector; selector = root; root = document }
  // BODY
  const listenHandle = root.addEventListener(eventType, (evt) => {
    elem = evt.target || evt.srcElement
    while (elem && elem.matches) {
      if (elem.matches(selector)) {
        // TODO I should probably think about propagation
        return callback.call(elem, evt)
      }
      elem = elem.parentNode
    }
  })
  return listenHandle // TODO this is returned so you can remove listeners, but do I need to adapt it at all?
}

<!------ Hardcoding ------>

  "velar-lateral": { text: "ʟ", },

<!------ Firmware ------>

var hardware = {}

function resetCursor(loc) {
  const out = hardware.output.element
  if (loc === undefined) { loc = out.value.length }
  out.selectionStart = out.selectionEnd = loc
}

<!------ Application ------>

function initHardware() {
  hardware.keyboard = {
    element: document.getElementById("keyboard") // TODO assert this exists
  }
  hardware.output = {
    element: document.getElementById("output") // TODO assert this exists
  }

  hardware.keyboard.keyClick = _live(document, "[data-key]", "click", function (evt) {
    keyElem = this
    evt.preventDefault()
    evt.stopPropagation()

    const keyName = keyElem.dataset.key
    const out = hardware.output.element
    const selection = {
      before: out.value.slice(0, out.selectionStart),
      selected: out.value.slice(out.selectionStart, out.selectionEnd),
      after: out.value.slice(out.selectionEnd),
      replacement: keeb[keyName]?.text || keyName,
    }
    // TODO there's so much suckiness here?
    out.value = selection.before + selection.replacement + selection.after
    resetCursor(selection.before.length + selection.replacement.length)
  })

  // make sure if the input isn't focused, then the input will go to the end
  resetCursor()
  hardware.output.element.addEventListener("blur", function (evt) { resetCursor() })
  // focus is normally taken away before a click event, so squash that
  hardware.keyboard.element.addEventListener("mousedown", function (evt) { evt.preventDefault() })

  Object.freeze(hardware)
}

document.addEventListener("DOMContentLoaded", () => {
  initHardware()
})
